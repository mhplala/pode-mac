name: Pode
options:
  bundleIdPrefix: studio.steve.pode
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.5.3"
    CURRENT_PROJECT_VERSION: "8"
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
targets:
  Pode:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Pode
    dependencies:
      - package: WhisperKit
    info:
      path: Pode/Info.plist
      properties:
        CFBundleName: pode
        CFBundleDisplayName: pode
        CFBundleShortVersionString: "0.4.0"
        CFBundleVersion: "4"
        LSMinimumSystemVersion: "14.0"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSHumanReadableCopyright: "© steve studio"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.steve.pode
        PRODUCT_NAME: Pode
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Pode/Pode.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
